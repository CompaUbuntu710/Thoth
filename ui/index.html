<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thoth</title>
  <link rel="stylesheet" href="/static/style.css?v=8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="scan-lines"></div>
  <div id="app">
    <div id="globe-container"></div>

    <header id="status-bar">
      <div class="status-left">
        <span class="logo">&#9763; THOTH</span>
        <span class="version">v2</span>
      </div>
      <div class="status-center">
        <span class="indicator">Online</span>
      </div>
      <div class="status-right">
        <span id="clock"></span>
      </div>
    </header>

    <aside id="hud">
      <div class="hud-item">
        <span class="hud-label">Status</span>
        <span class="hud-value" id="hud-status">ONLINE</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Memoria</span>
        <span class="hud-value" id="hud-memory-count">0 <span class="hud-unit">registros</span></span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Sesiones</span>
        <span class="hud-value" id="hud-sessions">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Uptime</span>
        <span class="hud-value" id="hud-uptime">--:--:--</span>
      </div>
    </aside>

    <button id="chat-toggle" title="Toggle terminal">
      <span class="toggle-dot"></span>
      <span class="toggle-label">TERM</span>
    </button>

    <aside id="chat-panel">
      <div class="panel-header">
        <h2>Terminal</h2>
        <span class="panel-dot"></span>
      </div>
      <div id="chat-messages">
        <div class="message assistant">Soy Thoth. Conectado.</div>
      </div>
      <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Mensaje..." autofocus>
        <button id="mic-btn" title="Micrófono" style="background:transparent;border:none;color:#666;cursor:pointer;font-size:1.2rem;padding:0 0.3rem;">&#127908;</button>
        <button id="chat-send" title="Enviar">&#10148;</button>
      </div>
    </aside>

    <div id="chat-toast" class="hidden">
      <div class="toast-icon">&#9763;</div>
      <div class="toast-content"></div>
    </div>

    <footer id="bottom-bar">
      <div id="news-panel">
        <div class="news-header">
          <span class="news-label">&#9881; Noticias</span>
          <span id="news-count" class="news-count">0</span>
        </div>
        <div id="news-list"></div>
      </div>
      <div id="music-player"></div>
      <div id="memory-bar">
        <div class="memory-header" id="memory-header-click">
          <span>&#9676; <span id="memory-count">0</span> registros</span>
          <span class="memory-arrow">&#9660;</span>
        </div>
        <div id="memory-list" class="collapsed"></div>
      </div>
    </footer>

    <aside id="right-panel">
      <div id="map-container">
        <div class="panel-header">
          <h2>Mapa Mental</h2>
          <span class="panel-dot"></span>
        </div>
        <div id="map-canvas-container"></div>
      </div>
    </aside>

    <div id="stats-bar">
      <div class="stats-item">
        <span class="stats-icon">&#9432;</span>
        <span class="stats-label">Proveedor</span>
        <span class="stats-value" id="stats-provider" style="color:var(--cyan)">--</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">Modelo</span>
        <span class="stats-value" id="stats-model">--</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">Mensajes</span>
        <span class="stats-value" id="stats-messages">0</span>
      </div>
      <div class="stats-item">
        <span class="stats-label">RAM</span>
        <span class="stats-value" id="stats-ram">--</span>
      </div>
      <div class="stats-item" style="cursor:pointer;" onclick="location.href='/settings'">
        <span class="stats-label" style="color:var(--gold)">&#9881; Config</span>
      </div>
      <div class="stats-item" style="cursor:pointer;" onclick="toggleTTS()" id="tts-toggle">
        <span class="stats-label" id="tts-label" style="color:#555;">&#128264; TTS</span>
      </div>
    </div>

    <!-- login overlay -->
    <div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,0.92);z-index:999;display:none;align-items:center;justify-content:center;">
      <div style="background:#12121e;padding:2rem;border-radius:12px;border:1px solid rgba(255,215,0,0.2);width:340px;">
        <h2 style="color:var(--gold);margin-bottom:1.5rem;text-align:center;">&#9813; Thoth</h2>
        <input id="login-user" type="text" placeholder="Usuario" style="width:100%;padding:0.6rem;margin-bottom:0.75rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:0.95rem;outline:none;">
        <input id="login-pass" type="password" placeholder="Contraseña" style="width:100%;padding:0.6rem;margin-bottom:1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:0.95rem;outline:none;">
        <div style="display:flex;gap:0.5rem;">
          <button onclick="loginUser()" style="flex:1;padding:0.6rem;background:linear-gradient(135deg,var(--gold),#ff8c00);border:none;border-radius:6px;color:#000;font-weight:600;cursor:pointer;">Ingresar</button>
          <button onclick="signupUser()" style="flex:1;padding:0.6rem;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#888;cursor:pointer;">Registrarse</button>
        </div>
        <div id="login-error" style="color:#ff5555;margin-top:0.75rem;font-size:0.85rem;display:none;"></div>
        <div style="margin-top:1rem;font-size:0.8rem;color:#555;text-align:center;">
          <label><input type="checkbox" id="skip-login" onchange="skipLogin()"> Omitir login</label>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/app.js?v=11"></script>
  <script>
  function showLogin() {
    const el = document.getElementById('login-overlay');
    if (el) el.style.display = 'flex';
  }

  async function loginUser() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const err = document.getElementById('login-error');
    if (!user || !pass) { err.textContent = 'Completa ambos campos'; err.style.display = 'block'; return; }
    try {
      const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:pass}) });
      if (!r.ok) { err.textContent = 'Credenciales inválidas'; err.style.display = 'block'; return; }
      const d = await r.json();
      localStorage.setItem('thoth_token', d.token);
      localStorage.setItem('thoth_user', d.username);
      document.getElementById('login-overlay').style.display = 'none';
      err.style.display = 'none';
    } catch(e) { err.textContent = 'Error de conexión'; err.style.display = 'block'; }
  }

  async function signupUser() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const err = document.getElementById('login-error');
    if (!user || !pass) { err.textContent = 'Completa ambos campos'; err.style.display = 'block'; return; }
    if (pass.length < 4) { err.textContent = 'Contraseña debe tener al menos 4 caracteres'; err.style.display = 'block'; return; }
    try {
      const r = await fetch('/api/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:pass}) });
      if (!r.ok) { err.textContent = 'El usuario ya existe'; err.style.display = 'block'; return; }
      err.style.color = '#00ff64';
      err.textContent = 'Registrado exitosamente. Ahora ingresa.';
      err.style.display = 'block';
    } catch(e) { err.textContent = 'Error de conexión'; err.style.display = 'block'; }
  }

  function skipLogin() {
    localStorage.setItem('thoth_skip_login', 'true');
    document.getElementById('login-overlay').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('thoth_token');
    const skip = localStorage.getItem('thoth_skip_login');
    if (!token && !skip) {
      document.getElementById('login-overlay').style.display = 'flex';
    }
  });
  </script>
</body>
</html>
